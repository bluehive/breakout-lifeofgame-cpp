name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libx11-6 libglx-mesa0 libgl1-mesa-dri

      - name: Fetch raylib prebuilt
        run: |
          mkdir -p vendor/raylib-prebuilt
          curl -sL https://github.com/raysan5/raylib/releases/download/6.0/raylib-6.0_linux_amd64.tar.gz \
            | tar xz -C vendor/raylib-prebuilt --strip-components=1

      - name: Run tests
        run: make test-all

      - name: Build executable
        run: make

      - name: Verify binary
        run: |
          ./breakout-lifeofgame-cpp --self-test
          file breakout-lifeofgame-cpp

      - name: Package Linux archive
        run: |
          mkdir -p dist
          cp breakout-lifeofgame-cpp dist/
          chmod +x dist/breakout-lifeofgame-cpp
          tar -czf breakout-lifeofgame-cpp-linux-amd64.tar.gz -C dist breakout-lifeofgame-cpp

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: breakout-lifeofgame-cpp-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-curl
            unzip

      - name: Build static Windows exe
        run: bash scripts/build-windows-mingw.sh

      - name: Check PE dependencies (expect minimal DLLs)
        run: |
          objdump -p breakout-lifeofgame-cpp.exe | grep -i "DLL Name" || true

      - name: Package Windows archive
        shell: pwsh
        run: |
          Compress-Archive -Path breakout-lifeofgame-cpp.exe -DestinationPath breakout-lifeofgame-cpp-win64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: breakout-lifeofgame-cpp-win64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: dist

      - name: Create GitHub Release (Linux + Windows)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }} (${{ github.sha }})
          prerelease: false
          generate_release_notes: true
          files: |
            dist/breakout-lifeofgame-cpp-linux-amd64.tar.gz
            dist/breakout-lifeofgame-cpp-win64.zip
          body: |
            Automated builds from commit `${{ github.sha }}`.

            ## Linux amd64
            ```bash
            tar xzf breakout-lifeofgame-cpp-linux-amd64.tar.gz
            ./breakout-lifeofgame-cpp
            ```
            Requires X11, OpenGL, PulseAudio.

            ## Windows 10/11 (MinGW static exe)
            1. Download `breakout-lifeofgame-cpp-win64.zip`
            2. Extract `breakout-lifeofgame-cpp.exe`
            3. Double-click or run from terminal

            No extra DLL install required (static-linked MinGW build).